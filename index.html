<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Entrenamientos</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111827" />
  <link rel="apple-touch-icon" href="icon192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Entrenos" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Registro de Entrenamiento</h1>
      <p class="subtitle">Controla tus sesiones de forma rápida, local y offline.</p>
    </header>

    <section class="card" aria-labelledby="registro-title">
      <h2 id="registro-title">Nuevo entrenamiento</h2>
      <div class="row">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" />
      </div>

      <div class="row">
        <label for="dia">Día</label>
        <select id="dia">
          <option value="">-- Selecciona --</option>
          <option value="1">🟦 DÍA 1 – Torso</option>
          <option value="2">🟩 DÍA 2 – Tren inferior + core</option>
          <option value="3">🟨 DÍA EXTRA – Full body</option>
        </select>
      </div>

      <div id="contenedor-ejercicios" class="exercise-list"></div>

      <label for="resumen">Resumen generado</label>
      <textarea id="resumen" placeholder="Aquí aparecerá el resumen generado..." readonly></textarea>
      <button id="btnGuardar" type="button">Guardar entrenamiento</button>
    </section>

    <section class="card" aria-labelledby="manual-title">
      <h2 id="manual-title">Cargar entrenamiento manual</h2>

      <div class="grid-2">
        <div class="row">
          <label for="manualFecha">Fecha</label>
          <input type="date" id="manualFecha" />
        </div>

        <div class="row">
          <label for="manualDia">Día</label>
          <select id="manualDia">
            <option value="">-- Selecciona día --</option>
            <option value="🟦 DÍA 1 – Torso">🟦 DÍA 1 – Torso</option>
            <option value="🟩 DÍA 2 – Tren inferior + core">🟩 DÍA 2 – Tren inferior + core</option>
            <option value="🟨 DÍA EXTRA – Full body">🟨 DÍA EXTRA – Full body</option>
          </select>
        </div>
      </div>

      <div class="row">
        <label for="manualNombre">Nombre alternativo del día (opcional)</label>
        <input type="text" id="manualNombre" placeholder="O escribe el nombre del día" />
      </div>

      <label for="manualTexto">Resumen manual</label>
      <textarea id="manualTexto" placeholder="Pega aquí tu resumen en formato texto..."></textarea>
      <button id="btnManual" type="button">Cargar entrenamiento manual</button>
    </section>

    <section class="card" aria-labelledby="historial-title">
      <h2 id="historial-title">Historial</h2>
      <div id="historial" class="history"></div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
